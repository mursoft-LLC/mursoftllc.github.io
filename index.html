<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mursoft, LLC | Independent Software Studio</title>
    <style>
        :root {
            --bg: #0f172a;
            --text: #f1f5f9;
            --accent: #38bdf8;
            --secondary: #94a3b8;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .tagline {
            color: var(--accent);
            font-size: 1.2rem;
            font-weight: 500;
            margin-bottom: 2rem;
        }
        .bio {
            color: var(--secondary);
            margin-bottom: 2.5rem;
        }
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid var(--accent);
        }
        .btn-primary {
            background-color: var(--accent);
            color: var(--bg);
        }
        .btn-secondary {
            color: var(--accent);
        }
        .btn:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }
        footer {
            margin-top: 4rem;
            font-size: 0.8rem;
            color: var(--secondary);
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>mursoft</h1>
        <div class="tagline">Engineering high-performance 3D experiences.</div>
        
        <p class="bio">
            Independent software studio specializing in real-time engine optimization, 
            3D asset pipelines, and enterprise-grade React architectures.
        </p>

        <div class="links">
            <!-- Replace these URLs with your actual links -->
            <a href="mursoftllc_technical_portfolio.pdf" class="btn btn-primary">Technical Portfolio (PDF)</a>
            <a href="https://www.linkedin.com/company/mursoft-llc" class="btn btn-secondary">LinkedIn</a>
            <a href="https://github.com/mursoft-LLC" class="btn btn-secondary">GitHub</a>
        </div>

        <footer>
            &copy; 2026 mursoft, LLC. All rights reserved.
        </footer>
    </div>

</body>
</html>
